<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manufaktur Blattwerk</title>

<style>
body {
    margin: 0;
    font-family: Georgia, serif;
    background: #efeae3;
    color: #2b2622;
}

/* HEADER MIT LOGO */
header {
    text-align: center;
    padding: 40px 20px 10px;
}

header img {
     width: 320px;
    max-width: 80%;
    height: auto;
    margin-bottom: 20px;
}

/* HERO */
.hero {
    height: 60vh;
    background: url("bilder/holz1.jpg") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

.hero h1 {
    background: rgba(0,0,0,0.5);
    color: white;
    padding: 15px 25px;
    font-size: 30px;
}

/* TEXT */
.intro {
    text-align: center;
    max-width: 700px;
    margin: 30px auto;
    color: #5c5148;
}

/* GALERIE */
.gallery {
    column-count: 3;
    column-gap: 20px;
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    margin-bottom: 20px;
    border-radius: 10px;
    overflow: hidden;
    break-inside: avoid;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.card img {
    width: 100%;
    display: block;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px;
    font-size: 14px;
    color: #7a7068;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
    <img src="logo.png" alt="Logo">
</header>

<!-- HERO -->
<section class="hero">
    <h1>Manufaktur Blattwerk</h1>
</section>

<!-- TEXT -->
<section class="intro">
    <p>
    Handgebundene Notizbücher aus Holz, Leder und Papier.<br>
    Jedes Stück ein Unikat – gefertigt in Handarbeit.
    </p>
</section>

<!-- GALERIE -->
<section class="gallery">

<div class="card"><img src="bilder/holz1.jpg"></div>
<div class="card"><img src="bilder/leder1.jpg"></div>
<div class="card"><img src="bilder/kork1.jpg"></div>
<div class="card"><img src="bilder/innen.jpg"></div>
<div class="card"><img src="bilder/blau.jpg"></div>
<div class="card"><img src="bilder/detail.jpg"></div>
<div class="card"><img src="bilder/ruecken.jpg"></div>

</section>

<!-- FOOTER -->
<footer>
© 2026 Manufaktur Blattwerk
</footer>

</body>
</html>
