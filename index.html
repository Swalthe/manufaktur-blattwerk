<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manufaktur Blattwerk</title>

<style>
body {
    margin: 0;
    font-family: Georgia, serif;
    background: #efeae3;
    color: #2b2622;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px 20px 5px;

    display: flex;
    flex-direction: column;
    align-items: center;
}

header img {
    width: 280px;           /* Logo größer */
    max-width: 90%;
    height: auto;
    margin-bottom: 5px;     /* enger Abstand */
}

header h1 {
    margin-top: 0;
    font-size: 28px;
    background: #6f6a64;
    color: white;
    display: inline-block;
    padding: 10px 20px;
}

/* HERO (kein riesiger Abstand mehr!) */
.hero {
    height: auto;
    padding: 30px 20px;
    text-align: center;
}

/* TEXT */
.intro {
    text-align: center;
    max-width: 700px;
    margin: 20px auto;
    color: #5c5148;
}

/* GALERIE */
.gallery {
    column-count: 3;
    column-gap: 20px;
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    margin-bottom: 20px;
    border-radius: 10px;
    overflow: hidden;
    break-inside: avoid;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.card img {
    width: 100%;
    display: block;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px;
    font-size: 14px;
    color: #7a7068;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
    <img src="logo.png" alt="Logo">
    <h1>Manufaktur Blattwerk</h1>
</header>

<!-- HERO -->
<section class="hero">
</section>

<!-- TEXT -->
<section class="intro">
    <p>
    Handgebundene Notizbücher aus Holz, Leder und Papier.<br>
    Jedes Stück ein Unikat – gefertigt in Handarbeit.
    </p>
</section>

<!-- GALERIE -->
<section class="gallery">

<div class="card"><img src="bilder/holz-notizbuch.jpg"></div>
<div class="card"><img src="bilder/leder-notizbuch.jpg"></div>
<div class="card"><img src="bilder/kork-notizbuch.jpg"></div>
<div class="card"><img src="bilder/stoff-notizbuch-blau.jpg"></div>
<div class="card"><img src="bilder/innen-seiten.jpg"></div>
<div class="card"><img src="bilder/detail-bindung.jpg"></div>
<div class="card"><img src="bilder/bindung-handarbeit.jpg"></div>

</section>

<!-- FOOTER -->
<footer>
© 2026 Manufaktur Blattwerk
</footer>

</body>
</html>
