<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manufaktur Blattwerk</title>

<style>
body {
    margin: 0;
    font-family: Georgia, serif;
    background: #efeae3;
    color: #2b2622;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px 20px 5px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header img {
    width: 280px;
    max-width: 90%;
    height: auto;
    margin-bottom: 5px;
}

header h1 {
    margin: 5px 0 10px;
    font-size: 28px;
    background: #6f6a64;
    color: white;
    padding: 10px 20px;
}

/* TEXT */
.intro {
    text-align: center;
    max-width: 700px;
    margin: 20px auto;
    color: #5c5148;
}

/* GALERIE */
.gallery {
    column-count: 3;
    column-gap: 20px;
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

@media (max-width: 900px) {
    .gallery { column-count: 2; }
}
@media (max-width: 500px) {
    .gallery { column-count: 1; }
}

.card {
    background: white;
    margin-bottom: 20px;
    border-radius: 10px;
    overflow: hidden;
    break-inside: avoid;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    cursor: pointer;
}

.card img {
    width: 100%;
    display: block;
}

/* LIGHTBOX */
.lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

.lightbox.active {
    display: flex;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px;
    font-size: 14px;
    color: #7a7068;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
    <img src="logo.png" alt="Logo Manufaktur Blattwerk">
    <h1>Manufaktur Blattwerk</h1>
</header>

<!-- TEXT -->
<section class="intro">
    <p>
    Handgebundene Notizbücher aus Holz, Leder und Papier.<br>
    Jedes Stück ein Unikat – gefertigt in Handarbeit.
    </p>
</section>

<!-- GALERIE -->
<section class="gallery">

<div class="card"><img src="bilder/holz-notizbuch.jpg" alt="Holz Notizbuch"></div>
<div class="card"><img src="bilder/leder-notizbuch.jpg" alt="Leder Notizbuch"></div>
<div class="card"><img src="bilder/kork-notizbuch.jpg" alt="Kork Notizbuch"></div>
<div class="card"><img src="bilder/stoff-notizbuch-blau.jpg" alt="Blaues Notizbuch"></div>
<div class="card"><img src="bilder/innen-seiten.jpg" alt="Innenseiten"></div>
<div class="card"><img src="bilder/detail-bindung.jpg" alt="Bindung Detail"></div>
<div class="card"><img src="bilder/bindung-handarbeit.jpg" alt="Handbindung"></div>

</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <img src="" id="lightbox-img">
</div>

<!-- FOOTER -->
<footer>
© 2026 Manufaktur Blattwerk
</footer>

<script>
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

document.querySelectorAll('.card img').forEach(img => {
    img.addEventListener('click', () => {
        lightbox.classList.add('active');
        lightboxImg.src = img.src;
    });
});

lightbox.addEventListener('click', () => {
    lightbox.classList.remove('active');
});
</script>

</body>
</html>
